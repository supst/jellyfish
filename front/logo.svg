    <path d="M50,70 Q100,40 150,70" opacity="0.3" stroke-width="1"/>
    <path d="M40,90 Q100,60 160,90" opacity="0.3" stroke-width="1"/>
    
    <g stroke-width="1.5">
      <path d="M70,135 Q75,160 65,185" />
      <path d="M85,133 Q90,165 80,190" />
